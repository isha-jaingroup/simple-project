<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(){try{if(localStorage.getItem('jg-theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');}}catch(e){}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show & Hide Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand">Simple Project</a>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li>
                <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false" title="Toggle dark mode">
                    <span class="theme-toggle-track">
                        <span class="theme-toggle-thumb">
                            <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
                            <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
                        </span>
                    </span>
                </button>
            </li>
        </ul>
    </nav>

    <div class="container">
        <h2>Secure Password Toggle - Password Utility</h2>

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button id="toggleBtn">
            Show Password
        </button>

        <div class="box-group">
            <div class="box box-red"></div>
            <div class="box box-yellow"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="theme.js"></script>

</body>
</html>
